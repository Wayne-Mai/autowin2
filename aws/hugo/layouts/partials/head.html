<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="{{ .Description | default site.Params.description }}">
<meta name="author" content="{{ site.Params.author }}">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
<link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ "index.xml" | absURL }}">
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #666;
    --bg: #fafafa;
    --border: #e5e5e5;
    --link: #0066cc;
    --max: 720px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e6e6e6; --muted: #999; --bg: #161616; --border: #2a2a2a; --link: #6aaaff; }
  }
  * { box-sizing: border-box; }
  html { font-size: 17px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65;
    color: var(--fg);
    background: var(--bg);
    margin: 0;
    padding: 0;
  }
  .wrap { max-width: var(--max); margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  header.site { padding-bottom: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
  header.site a.brand { font-weight: 700; font-size: 1.4rem; color: var(--fg); text-decoration: none; letter-spacing: -0.02em; }
  header.site nav { margin-top: 0.4rem; font-size: 0.92rem; }
  header.site nav a { color: var(--muted); text-decoration: none; margin-right: 1rem; }
  header.site nav a:hover { color: var(--link); }
  h1 { font-size: 1.9rem; line-height: 1.2; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
  h2 { font-size: 1.35rem; margin-top: 2.2rem; letter-spacing: -0.01em; }
  h3 { font-size: 1.1rem; margin-top: 1.6rem; }
  a { color: var(--link); }
  p { margin: 1rem 0; }
  .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.8rem; }
  .post-list { list-style: none; padding: 0; }
  .post-list li { margin-bottom: 1.8rem; padding-bottom: 1.4rem; border-bottom: 1px solid var(--border); }
  .post-list li:last-child { border-bottom: none; }
  .post-list h2 { margin: 0 0 0.3rem; font-size: 1.25rem; }
  .post-list h2 a { color: var(--fg); text-decoration: none; }
  .post-list h2 a:hover { color: var(--link); }
  .post-list .meta { margin: 0 0 0.5rem; font-size: 0.85rem; }
  .post-list .summary { color: var(--muted); font-size: 0.95rem; }
  .lead { font-size: 1.05rem; color: var(--muted); margin-bottom: 2rem; }
  footer.site { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.85rem; }
  code { background: rgba(127,127,127,0.12); padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.92em; }
  blockquote { border-left: 3px solid var(--border); padding-left: 1rem; color: var(--muted); margin: 1.5rem 0; }
  hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
</style>
